name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  centrix:
    name: centrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: centrix/go.sum

      - name: Format check
        working-directory: centrix
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: centrix
        run: go vet ./...

      - name: Test
        working-directory: centrix
        run: go test ./... -race -count=1 -timeout=120s

      - name: Benchmark (smoke)
        working-directory: centrix
        run: go test ./core/... -bench=. -benchtime=100ms -run='^$'
